<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Search Form</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --accent: #1a3a2a;
      --accent-light: #2d6a4f;
      --gold: #c9a84c;
      --text: #1c1c1c;
      --muted: #6b7280;
      --border: #e2ddd6;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      background-image: radial-gradient(circle at 10% 20%, rgba(45,106,79,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--accent);
      line-height: 1.15;
    }

    header h1 em {
      color: var(--gold);
      font-style: italic;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    @media(max-width: 820px) {
      .container { grid-template-columns: 1fr; }
    }

    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px;
      border: 1px solid var(--border);
    }

    .form-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-card h2 .dot {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      display: inline-block;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fafaf8;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: var(--accent-light); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* PROFILE CARD */
    .profile-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      position: sticky;
      top: 24px;
    }

    .profile-banner {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      height: 90px;
      position: relative;
    }

    .profile-banner::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: var(--surface);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--gold);
      border: 3px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: #fff;
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .profile-body {
      padding: 52px 28px 28px;
      text-align: center;
    }

    .profile-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
    }

    .profile-title {
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 2px;
      margin-bottom: 20px;
    }

    .profile-divider {
      width: 40px; height: 2px;
      background: var(--gold);
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: left;
      margin-bottom: 16px;
    }

    .profile-field {
      background: #f9f8f5;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .profile-field .lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .profile-field .val {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .profile-field.full { grid-column: 1 / -1; }

    .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

    .skill-badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .placeholder-msg {
      padding: 30px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .placeholder-msg .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      padding: 10px;
      background: rgba(45,106,79,0.07);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--accent-light);
      font-weight: 600;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-light);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="tag">Experiment 3</div>
  <h1>Job Search <em>Form</em></h1>
  <p>Fill in your details to generate your candidate profile instantly.</p>
</header>

<div class="container">

  <!-- FORM -->
  <div class="form-card">
    <h2><span class="dot"></span> Candidate Details</h2>

    <div class="row-2">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="e.g. Arjun" />
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="e.g. Sharma" />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 98765 43210" />
    </div>

    <div class="row-2">
      <div class="form-group">
        <label for="jobTitle">Desired Job Title</label>
        <input type="text" id="jobTitle" placeholder="e.g. Software Engineer" />
      </div>
      <div class="form-group">
        <label for="experience">Experience</label>
        <select id="experience">
          <option value="">Select</option>
          <option>Fresher (0–1 yr)</option>
          <option>Junior (1–3 yrs)</option>
          <option>Mid-level (3–5 yrs)</option>
          <option>Senior (5–10 yrs)</option>
          <option>Lead (10+ yrs)</option>
        </select>
      </div>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label for="location">Preferred Location</label>
        <input type="text" id="location" placeholder="e.g. Bangalore" />
      </div>
      <div class="form-group">
        <label for="salary">Expected Salary</label>
        <input type="text" id="salary" placeholder="e.g. ₹8 LPA" />
      </div>
    </div>

    <div class="form-group">
      <label for="jobType">Job Type</label>
      <select id="jobType">
        <option value="">Select</option>
        <option>Full-Time</option>
        <option>Part-Time</option>
        <option>Remote</option>
        <option>Hybrid</option>
        <option>Internship</option>
        <option>Freelance</option>
      </select>
    </div>

    <div class="form-group">
      <label for="skills">Key Skills <span style="font-weight:300;text-transform:none;letter-spacing:0">(comma separated)</span></label>
      <input type="text" id="skills" placeholder="e.g. Python, React, SQL, AWS" />
    </div>

    <div class="form-group">
      <label for="about">About / Summary</label>
      <textarea id="about" placeholder="A brief summary about yourself and your career goals..."></textarea>
    </div>

    <button class="btn" onclick="generateProfile()">Generate Profile →</button>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card" id="profileCard">
    <div class="profile-banner">
      <div class="profile-avatar" id="avatarEl">?</div>
    </div>
    <div class="profile-body" id="profileBody">
      <div class="placeholder-msg">
        <span class="icon">📋</span>
        Fill in the form on the left and click <strong>Generate Profile</strong> to preview your candidate card here — no page reload needed.
      </div>
    </div>
  </div>

</div>

<script>
  // Live avatar initials preview
  const firstEl = document.getElementById('firstName');
  const lastEl  = document.getElementById('lastName');
  const avatar  = document.getElementById('avatarEl');

  function updateAvatar() {
    const f = firstEl.value.trim();
    const l = lastEl.value.trim();
    avatar.textContent = (f[0] || '') + (l[0] || '') || '?';
  }

  firstEl.addEventListener('input', updateAvatar);
  lastEl.addEventListener('input', updateAvatar);

  function generateProfile() {
    const get = id => document.getElementById(id).value.trim();

    const firstName = get('firstName');
    const lastName  = get('lastName');
    const email     = get('email');
    const phone     = get('phone');
    const jobTitle  = get('jobTitle');
    const exp       = get('experience');
    const location  = get('location');
    const salary    = get('salary');
    const jobType   = get('jobType');
    const skillsRaw = get('skills');
    const about     = get('about');

    if (!firstName && !lastName) {
      alert('Please enter at least your name to generate a profile.');
      return;
    }

    const fullName = [firstName, lastName].filter(Boolean).join(' ');
    const initials = (firstName[0] || '') + (lastName[0] || '');

    const skills = skillsRaw
      ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    const skillBadges = skills.length
      ? skills.map(s => `<span class="skill-badge">${s}</span>`).join('')
      : '<span style="color:var(--muted);font-size:13px">—</span>';

    const field = (label, value, full = false) => `
      <div class="profile-field ${full ? 'full' : ''}">
        <div class="lbl">${label}</div>
        <div class="val">${value || '—'}</div>
      </div>`;

    const html = `
      <p class="profile-name fade-in">${fullName}</p>
      <p class="profile-title fade-in">${jobTitle || 'Job Seeker'}</p>
      <div class="profile-divider"></div>
      <div class="profile-grid fade-in">
        ${field('Email', email)}
        ${field('Phone', phone)}
        ${field('Experience', exp)}
        ${field('Job Type', jobType)}
        ${field('Location', location)}
        ${field('Salary', salary)}
        <div class="profile-field full fade-in">
          <div class="lbl">Skills</div>
          <div class="val"><div class="skills-wrap">${skillBadges}</div></div>
        </div>
        ${about ? `<div class="profile-field full fade-in">
          <div class="lbl">About</div>
          <div class="val" style="line-height:1.6;font-size:13px">${about}</div>
        </div>` : ''}
      </div>
    `;

    document.getElementById('profileBody').innerHTML = html;
    avatar.textContent = initials || '?';

    // Add status bar once
    const card = document.getElementById('profileCard');
    if (!card.querySelector('.status-bar')) {
      const bar = document.createElement('div');
      bar.className = 'status-bar fade-in';
      bar.innerHTML = '<div class="status-dot"></div> Profile Updated Live';
      card.appendChild(bar);
    }
  }
</script>
</body>
</html>
